<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>30秒節水記憶挑戰</title>
    <!-- 引入 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        /* 翻牌的 3D 透視與過渡動畫設定 */
        .perspective { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transition-transform { transition: transform 0.5s ease-in-out; }
        
        /* 防止使用者選取文字影響遊戲體驗 */
        body { user-select: none; -webkit-user-select: none; }
        
        /* 隱藏捲軸保持版面乾淨 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-cyan-50 to-blue-200 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 遊戲主畫面容器 -->
    <div class="w-full max-w-md bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl overflow-hidden relative border-2 border-cyan-100">
        
        <!-- 標題與資訊列 -->
        <div class="bg-gradient-to-r from-cyan-500 to-blue-500 text-white p-4 text-center">
            <h1 class="text-2xl font-bold mb-2 flex items-center justify-center gap-2">
                <span>💧</span> 節水記憶挑戰 <span>💧</span>
            </h1>
            <div class="flex justify-between items-center px-4 font-mono text-lg">
                <div><span id="status-text">剩餘時間</span>: <span id="time-display" class="font-bold text-yellow-300">30</span> <span id="time-unit">秒</span></div>
                <div>配對: <span id="score-display">0</span>/<span id="total-pairs">6</span></div>
            </div>
        </div>

        <!-- 遊戲盤面 (3x4 或 4x3 網格) -->
        <div id="game-board" class="grid grid-cols-3 md:grid-cols-4 gap-2 p-4 bg-cyan-900/5 min-h-[350px]">
            <!-- 卡片會由 JavaScript 動態生成 -->
        </div>

        <!-- 遊戲開始/覆蓋面版 -->
        <div id="overlay" class="absolute inset-0 bg-black/70 flex flex-col items-center justify-center z-10">
            <div id="message-box" class="bg-white p-6 rounded-xl text-center max-w-[80%]">
                <h2 id="overlay-title" class="text-xl font-bold text-cyan-800 mb-2">準備好了嗎？</h2>
                <p id="overlay-desc" class="text-cyan-700 mb-6 text-sm">請在 30 秒內找出所有節水小撇步！</p>
                <button id="start-btn" class="bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition active:scale-95">
                    開始遊戲
                </button>
            </div>
        </div>
    </div>

    <!-- 載入中遮罩 -->
    <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
        <p class="text-gray-500">載入 LINE 資訊中...</p>
    </div>

    <script>
        // --- 變數設定 ---
        const LIFF_ID = "2009756203-gC2ejwHA"; // [注意] 這裡請填入你的 LIFF ID
        const GAME_TIME = 30;
        const MEMO_TIME = 10; // 記憶時間 10 秒
        const TOTAL_PAIRS = 6; // 6對卡片 = 12張
        const waterTips = [
            { id: 1, icon: '🚰', text: '隨手關水' },
            { id: 2, icon: '🚿', text: '淋浴速洗' },
            { id: 3, icon: '🚽', text: '兩段沖水' },
            { id: 4, icon: '👕', text: '集中洗衣' },
            { id: 5, icon: '🌧️', text: '收集雨水' },
            { id: 6, icon: '🪣', text: '水桶洗車' },
            { id: 7, icon: '🌱', text: '洗米澆花' },
            { id: 8, icon: '🔍', text: '定期查漏' }
        ];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let timer = null;
        let timeLeft = GAME_TIME;
        let isPlaying = false;
        let isLockBoard = false; // 防止動畫期間點擊

        // --- DOM 元素 ---
        const board = document.getElementById('game-board');
        const statusText = document.getElementById('status-text');
        const timeDisplay = document.getElementById('time-display');
        const timeUnit = document.getElementById('time-unit');
        const scoreDisplay = document.getElementById('score-display');
        const totalPairsDisplay = document.getElementById('total-pairs');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const startBtn = document.getElementById('start-btn');
        const loading = document.getElementById('loading');

        // --- 初始化 LIFF ---
        async function initializeLiff() {
            try {
                // 如果沒有填入 LIFF_ID，就先隱藏 Loading 以便在電腦瀏覽器測試遊戲邏輯
                if(LIFF_ID === "YOUR_LIFF_ID") {
                    console.warn("未設定 LIFF ID，將以純網頁模式運行。");
                    loading.style.display = 'none';
                    return;
                }

                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    loading.style.display = 'none';
                }
            } catch (err) {
                console.error("LIFF 初始化失敗", err);
                loading.style.display = 'none';
            }
        }

        // --- 遊戲邏輯 ---
        function createBoard() {
            board.innerHTML = '';
            
            // 從 8 個知識中隨機挑選 6 個
            const selectedTips = [...waterTips].sort(() => Math.random() - 0.5).slice(0, TOTAL_PAIRS);
            
            // 複製成兩組陣列並打亂
            cards = [...selectedTips, ...selectedTips].sort(() => Math.random() - 0.5);
            
            cards.forEach((tip, index) => {
                const card = document.createElement('div');
                card.className = 'relative w-full aspect-square perspective cursor-pointer';
                card.dataset.id = tip.id;
                card.dataset.index = index;

                // 內層容器 (處理 3D 翻轉)
                const inner = document.createElement('div');
                inner.className = 'w-full h-full absolute transform-style-3d transition-transform duration-500 card-inner shadow-sm rounded-lg';
                
                // 背面 (蓋著的卡背)
                const back = document.createElement('div');
                back.className = 'w-full h-full absolute backface-hidden bg-gradient-to-br from-cyan-400 to-blue-500 rounded-lg flex items-center justify-center border-2 border-white/50 shadow-md';
                back.innerHTML = '<span class="text-white text-3xl opacity-70 drop-shadow-md">💧</span>';

                // 正面 (翻開的節水知識)
                const front = document.createElement('div');
                front.className = 'w-full h-full absolute backface-hidden rotate-y-180 bg-white rounded-lg flex flex-col items-center justify-center shadow-inner border-2 border-cyan-200';
                front.innerHTML = `
                    <span class="text-2xl md:text-3xl mb-1">${tip.icon}</span>
                    <span class="text-[10px] md:text-xs font-bold text-cyan-800 text-center leading-tight px-1">${tip.text}</span>
                `;

                inner.appendChild(back);
                inner.appendChild(front);
                card.appendChild(inner);

                // 綁定點擊事件
                card.addEventListener('click', () => flipCard(card, inner));
                board.appendChild(card);
            });
        }

        function flipCard(card, inner) {
            if (!isPlaying || isLockBoard) return;
            if (flippedCards.includes(card) || card.classList.contains('matched')) return;

            // 執行翻牌動畫
            inner.classList.add('rotate-y-180');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLockBoard = true;
            const [card1, card2] = flippedCards;
            const match = card1.dataset.id === card2.dataset.id;

            if (match) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                scoreDisplay.textContent = matchedPairs;
                resetFlipped();
                
                if (matchedPairs === TOTAL_PAIRS) {
                    endGame(true);
                }
            } else {
                // 沒對中，延遲一秒後蓋回來
                setTimeout(() => {
                    card1.querySelector('.card-inner').classList.remove('rotate-y-180');
                    card2.querySelector('.card-inner').classList.remove('rotate-y-180');
                    resetFlipped();
                }, 800);
            }
        }

        function resetFlipped() {
            flippedCards = [];
            isLockBoard = false;
        }

        function startGame() {
            // 重置狀態
            matchedPairs = 0;
            scoreDisplay.textContent = matchedPairs;
            totalPairsDisplay.textContent = TOTAL_PAIRS;
            overlay.style.display = 'none';
            isPlaying = false; // 記憶階段尚未開始遊戲，玩家不能翻牌
            isLockBoard = true; // 記憶階段鎖定點擊
            flippedCards = [];
            
            createBoard();

            // 記憶階段倒數
            let memoTime = MEMO_TIME;
            statusText.textContent = '記憶時間';
            timeDisplay.textContent = memoTime;
            timeDisplay.className = 'font-bold text-cyan-300';

            // 翻開所有卡片
            const allInners = document.querySelectorAll('.card-inner');
            // 稍微延遲一下讓元素渲染後再翻開，動畫比較順暢
            setTimeout(() => {
                allInners.forEach(inner => inner.classList.add('rotate-y-180'));
            }, 100);

            // 啟動記憶計時器
            clearInterval(timer);
            timer = setInterval(() => {
                memoTime--;
                timeDisplay.textContent = memoTime;
                
                if (memoTime <= 0) {
                    clearInterval(timer);
                    // 時間到，蓋回所有卡片
                    allInners.forEach(inner => inner.classList.remove('rotate-y-180'));
                    
                    // 等待蓋牌動畫(0.5秒)結束後，正式開始遊戲
                    setTimeout(startActualGame, 500);
                }
            }, 1000);
        }

        function startActualGame() {
            isPlaying = true;
            isLockBoard = false;
            timeLeft = GAME_TIME;
            
            statusText.textContent = '剩餘時間';
            timeDisplay.textContent = timeLeft;
            timeDisplay.className = 'font-bold text-yellow-300';

            // 啟動遊戲計時器
            timer = setInterval(() => {
                timeLeft--;
                timeDisplay.textContent = timeLeft;
                
                if (timeLeft <= 10) {
                    timeDisplay.classList.add('text-red-500', 'animate-pulse');
                } else {
                    timeDisplay.classList.remove('text-red-500', 'animate-pulse');
                }

                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function endGame(isWin) {
            clearInterval(timer);
            isPlaying = false;
            overlay.style.display = 'flex';
            
            // 確保文字狀態恢復
            statusText.textContent = '剩餘時間';
            timeDisplay.className = 'font-bold text-yellow-300';
            
            if (isWin) {
                const usedTime = GAME_TIME - timeLeft;
                overlayTitle.textContent = '🎉 挑戰成功！';
                overlayTitle.className = 'text-xl font-bold text-green-600 mb-2';
                overlayDesc.textContent = `太厲害了，你只花了 ${usedTime} 秒！將自動送出成績至聊天室。`;
                startBtn.textContent = '關閉並送出成績';
                startBtn.onclick = () => sendResultToChat(true, usedTime);
            } else {
                overlayTitle.textContent = '😢 時間到！';
                overlayTitle.className = 'text-xl font-bold text-red-600 mb-2';
                overlayDesc.textContent = `還差一點點，再試一次吧！`;
                startBtn.textContent = '重新挑戰';
                startBtn.onclick = startGame; // 重新開始
            }
        }

        // --- LINE 互動邏輯 ---
        function sendResultToChat(isWin, time) {
            if (!liff.isInClient()) {
                // 如果是在外部瀏覽器測試
                showMessage("這是網頁版預覽，在 LINE APP 中會傳送成績並關閉視窗。");
                startGame();
                return;
            }

            const messageText = isWin 
                ? `🎉 我在「節水記憶挑戰」中，花了 ${time} 秒成功過關！你也來學習節水小知識吧！💧`
                : `😢 我在「節水記憶挑戰」失敗了，水資源流失中，需要多練習！💧`;

            // 顯示傳送中狀態
            startBtn.textContent = '傳送中...';
            startBtn.disabled = true;

            liff.sendMessages([{
                type: 'text',
                text: messageText
            }]).then(() => {
                liff.closeWindow(); // 傳送成功後關閉 LIFF 視窗
            }).catch((err) => {
                console.error('傳送訊息失敗', err);
                startBtn.textContent = '傳送失敗，點擊關閉';
                startBtn.disabled = false;
                startBtn.onclick = () => liff.closeWindow();
            });
        }

        // 簡易的自定義提示框替代 alert
        function showMessage(msg) {
            const tempDiv = document.createElement('div');
            tempDiv.className = 'fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded shadow-lg z-50 text-sm';
            tempDiv.textContent = msg;
            document.body.appendChild(tempDiv);
            setTimeout(() => tempDiv.remove(), 3000);
        }

        // --- 事件綁定 ---
        startBtn.onclick = startGame;
        
        // 啟動初始化
        window.onload = initializeLiff;

    </script>
</body>
</html>
